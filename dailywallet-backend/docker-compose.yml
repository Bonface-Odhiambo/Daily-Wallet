services:
  backend:
    build: .
    container_name: dailywallet-backend
    env_file:
      - .env                    # cleaner than listing every var manually
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s         # gives Spring Boot time to fully start
    volumes:
      - ./logs:/app/logs        # persist logs outside container
    logging:
      driver: "json-file"
      options:
        max-size: "10m"         # prevent logs eating disk space
        max-file: "3"