spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
    
logging:
  level:
    com.dailywallet: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/jimudu-backend.log

app:
  mpesa:
    api-url: ${MPESA_API_URL:https://api.safaricom.co.ke}
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:https://daily-wallet.vercel.app,https://daily-wallet-8ej6.onrender.com}
  market:
    api-key: ${ALPHA_VANTAGE_API_KEY:}
    base-url: https://www.alphavantage.co/query
    cache-duration-minutes: 15
    
# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000} # 24 hours
  
# Actuator endpoints for monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
