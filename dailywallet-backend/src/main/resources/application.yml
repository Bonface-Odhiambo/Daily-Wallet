spring:
  application:
    name: dailywallet-backend
  
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/dailywallet}
    username: ${DB_USER:dailywallet}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      connection-test-query: SELECT 1
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: Africa/Nairobi
  
  jackson:
    time-zone: Africa/Nairobi
    default-property-inclusion: non_null

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

app:
  jwt:
    secret: ${JWT_SECRET:default-secret-key-change-in-production-min-256-bits}
    expiration: 86400000
  
  mpesa:
    consumer-key: ${MPESA_CONSUMER_KEY:}
    consumer-secret: ${MPESA_CONSUMER_SECRET:}
    shortcode: ${MPESA_SHORTCODE:}
    passkey: ${MPESA_PASSKEY:}
    environment: ${MPESA_ENVIRONMENT:sandbox}
    api-url: ${MPESA_ENVIRONMENT:sandbox}
    callback-url: ${MPESA_CALLBACK_URL:http://localhost:8080/api/mpesa/callback}
  
  wallet:
    daily-release-time: "06:00:00"
    weekly-release-day: SUNDAY
    monthly-release-day: 1
    interest-rate: 0.13
    interest-calculation-time: "23:59:00"
  
  otp:
    expiration-minutes: 5
    length: 6
  
  bank:
    # Local Kenyan bank integration for holding funds
    # TODO: Configure with actual bank credentials
    account-number: ${BANK_ACCOUNT_NUMBER:}
    account-name: ${BANK_ACCOUNT_NAME:DailyWallet Holdings}
    bank-code: ${BANK_CODE:}
    branch-code: ${BRANCH_CODE:}
    api-url: ${BANK_API_URL:}
    api-key: ${BANK_API_KEY:}
    api-secret: ${BANK_API_SECRET:}
    # Auto-sweep M-Pesa funds to bank (recommended for security)
    auto-sweep-enabled: ${BANK_AUTO_SWEEP:false}
    auto-sweep-threshold: 10000  # Sweep when M-Pesa balance exceeds KES 10,000

logging:
  level:
    com.dailywallet: INFO
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: true
