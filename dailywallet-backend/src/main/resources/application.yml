spring:
  application:
    name: dailywallet-backend
  
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/dailywallet}
    username: ${DB_USER:dailywallet}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      connection-test-query: SELECT 1
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: Africa/Nairobi
  
  jackson:
    time-zone: Africa/Nairobi
    default-property-inclusion: non_null

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

app:
  jwt:
    secret: ${JWT_SECRET:default-secret-key-change-in-production-min-256-bits}
    expiration: 86400000
  
  mpesa:
    consumer-key: ${MPESA_CONSUMER_KEY:}
    consumer-secret: ${MPESA_CONSUMER_SECRET:}
    shortcode: ${MPESA_SHORTCODE:}
    passkey: ${MPESA_PASSKEY:}
    environment: ${MPESA_ENVIRONMENT:sandbox}
    api-url: ${MPESA_ENVIRONMENT:sandbox}
    callback-url: ${MPESA_CALLBACK_URL:http://localhost:8080/api/mpesa/callback}
  
  wallet:
    daily-release-time: "06:00:00"
    weekly-release-day: SUNDAY
    monthly-release-day: 1
    interest-rate: 0.13
    interest-calculation-time: "23:59:00"
  
  otp:
    expiration-minutes: 5
    length: 6
  
  bank:
    # Local Kenyan bank integration for holding funds
    # TODO: Configure with actual bank credentials
    account-number: ${BANK_ACCOUNT_NUMBER:}
    account-name: ${BANK_ACCOUNT_NAME:DailyWallet Holdings}
    bank-code: ${BANK_CODE:}
    branch-code: ${BRANCH_CODE:}
    api-url: ${BANK_API_URL:}
    api-key: ${BANK_API_KEY:}
    api-secret: ${BANK_API_SECRET:}
    # Auto-sweep M-Pesa funds to bank (recommended for security)
    auto-sweep-enabled: ${BANK_AUTO_SWEEP:false}
    auto-sweep-threshold: 10000  # Sweep when M-Pesa balance exceeds KES 10,000
  
  mmf:
    # Money Market Fund configuration
    provider: ${MMF_PROVIDER:CIC Money Market Fund}
    annual-return-rate: ${MMF_ANNUAL_RETURN:13.0}  # Expected annual return percentage
    auto-invest-threshold: ${MMF_AUTO_INVEST_THRESHOLD:1000.0}  # Auto-invest when savings exceed this
    min-investment: ${MMF_MIN_INVESTMENT:100.0}  # Minimum investment amount
    redemption-period-days: ${MMF_REDEMPTION_DAYS:1}  # Days to process redemption
  
  overdraft:
    # Overdraft facility configuration
    default-limit: ${OVERDRAFT_DEFAULT_LIMIT:500.0}  # Default overdraft limit in KES
    daily-interest-rate: ${OVERDRAFT_DAILY_RATE:0.1}  # Daily interest rate (0.1% = 36.5% annual)
    fixed-fee: ${OVERDRAFT_FIXED_FEE:50.0}  # Fixed fee per overdraft usage
    grace-period-days: ${OVERDRAFT_GRACE_PERIOD:7}  # Days before interest starts
    max-limit: ${OVERDRAFT_MAX_LIMIT:5000.0}  # Maximum overdraft limit
  
  market:
    # Alpha Vantage API configuration for NSE stock data
    api-key: ${ALPHA_VANTAGE_API_KEY:}
    base-url: https://www.alphavantage.co/query
    cache-duration-minutes: 15  # Cache stock data for 15 minutes to avoid rate limits

logging:
  level:
    com.dailywallet: INFO
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: true
